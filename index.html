<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: white; padding: 40px; }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px;
    background: white;
  }
  .icon-box {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #2563eb;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-box svg { width: 18px; height: 18px; }
  .text {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.025em;
    color: #111827;
    white-space: nowrap;
  }
  .text .blue { color: #2563eb; }

  h2 { font-family: sans-serif; font-size: 14px; color: #666; margin: 30px 0 10px; }
  .divider { border-top: 1px solid #eee; margin: 30px 0; }

  .favicon-box {
    width: 128px; height: 128px;
    border-radius: 24px;
    background: #2563eb;
    display: flex; align-items: center; justify-content: center;
  }
  .favicon-box svg { width: 72px; height: 72px; }
</style>
</head>
<body>

<h2>CHECKOUT LOGO — right-click > Save image as:</h2>
<div class="logo">
  <div class="icon-box">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect width="10" height="14" x="3" y="8" rx="2"/>
      <path d="M5 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-2.4"/>
      <path d="M8 18h.01"/>
    </svg>
  </div>
  <span class="text">Easy<span class="blue">Guard</span></span>
</div>

<div class="divider"></div>

<h2>FAVICON — right-click > Save image as:</h2>
<div class="favicon-box">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect width="10" height="14" x="3" y="8" rx="2"/>
    <path d="M5 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-2.4"/>
    <path d="M8 18h.01"/>
  </svg>
</div>

</body>
</html>
